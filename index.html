<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفر — قريباً</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #0a0a0f;
      --neon: #00f5d4;
      --coral: #f5928b;
      --glow: rgba(0, 245, 212, 0.4);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: 'Noto Sans Arabic', sans-serif;
      background: var(--void);
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated gradient background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 80% at 20% 20%, rgba(0, 245, 212, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 80% 80%, rgba(245, 146, 139, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(100, 80, 255, 0.08) 0%, transparent 45%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0.9; transform: scale(1.05) rotate(1deg); }
    }

    /* Grid overlay */
    .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
      animation: gridPulse 8s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.2;
      z-index: 0;
      animation: float 15s ease-in-out infinite;
    }
    .orb--1 { width: 300px; height: 300px; background: var(--neon); left: 10%; top: 20%; animation-delay: 0s; }
    .orb--2 { width: 200px; height: 200px; background: var(--coral); right: 15%; bottom: 25%; animation-delay: -5s; }
    .orb--3 { width: 180px; height: 180px; background: #7b2cbf; left: 50%; bottom: 10%; animation-delay: -10s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Main content */
    .coming {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
    }

    /* Glass card */
    .card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 3.5rem 2.5rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 40px 80px -20px rgba(0,0,0,0.5),
        0 0 80px -20px var(--glow);
      animation: cardGlow 6s ease-in-out infinite;
    }

    @keyframes cardGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 40px 80px -20px rgba(0,0,0,0.5), 0 0 60px -20px var(--glow); }
      50% { box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 40px 80px -20px rgba(0,0,0,0.5), 0 0 100px -15px var(--glow); }
    }

    .brand {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #fff 0%, var(--neon) 50%, var(--coral) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientMove 5s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes gradientMove {
      to { background-position: 200% center; }
    }

    .badge {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 2rem;
      opacity: 0.9;
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.75rem;
      text-shadow: 0 0 40px var(--glow);
    }

    .title-ar {
      font-family: 'Noto Sans Arabic', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      max-width: 36ch;
      margin: 0 auto 2.5rem;
    }

    /* Cooking indicator */
    .cook {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--neon);
      text-transform: uppercase;
    }

    .cook-dots {
      display: flex;
      gap: 6px;
    }

    .cook-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 12px var(--neon);
      animation: cookBounce 1.4s ease-in-out infinite both;
    }

    .cook-dots span:nth-child(1) { animation-delay: 0s; }
    .cook-dots span:nth-child(2) { animation-delay: 0.2s; }
    .cook-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes cookBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Ring */
    .ring {
      position: absolute;
      inset: -2px;
      border-radius: 34px;
      border: 1px solid transparent;
      background: linear-gradient(var(--void), var(--void)) padding-box,
                  linear-gradient(135deg, var(--neon), transparent 40%, var(--coral), transparent 70%, var(--neon)) border-box;
      opacity: 0.4;
      animation: ringRotate 10s linear infinite;
      pointer-events: none;
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    .card-wrap { position: relative; }

    @media (max-width: 600px) {
      .card { padding: 2.5rem 1.5rem; }
      .badge { letter-spacing: 0.2em; font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="grid" aria-hidden="true"></div>
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>
  <div class="orb orb--3" aria-hidden="true"></div>

  <main class="coming">
    <div class="card-wrap">
      <div class="ring" aria-hidden="true"></div>
      <article class="card">
        <p class="badge">2050</p>
        <h1 class="brand">صفر</h1>
        <h2 class="title">Coming Soon</h2>
        <p class="title-ar">قريباً</p>
        <p class="tagline">Something is cooking. We're building the next chapter of digital innovation—from zero to mastery.</p>
        <p class="tagline" style="margin-bottom: 0;">شيء قادم. نُعدّ الفصل القادم من الابتكار الرقمي — من الصفر للأحتراف.</p>
        <div class="cook" aria-hidden="true">
          <span class="cook-dots">
            <span></span><span></span><span></span>
          </span>
          <span>In the oven</span>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
